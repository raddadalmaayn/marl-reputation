name: ablation_no_stake
description: "Ablation: no stake barrier — simulated by setting min_stake_required to 0 (no economic deterrence)"
n_agents: 20
max_steps: 100
episodes: 5000
eval_episodes: 20
seeds: 3
adversarial_ids: [0, 1, 2, 3, 4]
adversarial_reward_bonus: 0.5
collusion_groups: []
max_sybils_per_agent: 0
checkpoint_every: 500
convergence_reward_variance_threshold: 0.05
convergence_window: 100
max_episodes_extended: 5000
# SystemConfig override: remove stake barrier (use 1.0 to avoid div-by-zero but effectively no requirement)
min_stake_required: 1.0
